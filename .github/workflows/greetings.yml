name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: |
          👋 Thanks for opening your first issue! We appreciate your contribution to this project.
          Please make sure to follow our guidelines and provide as much detail as possible.
        pr-message: |
          🎉 Congratulations on your first Pull Request! Thank you for contributing to our Discord bot.
          A maintainer will review your changes soon. Make sure all checks pass!
